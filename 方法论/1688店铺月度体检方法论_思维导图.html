# 1688 店铺月度体检方法论 V2

## 一、资料查询（What to scrape · 抓什么）

### 1.1 本店数据（自家）

#### 店铺基础

- 店铺主体名 / 二级域名 / memberId
- 入驻年限 / 成立时间
- 地址 / 工厂面积 / 员工数
- 经营大类 / 主营类目（按比例）
- 钻级（一钻/二钻/三钻/金牌）
- 实力星级（L1-L5）/ 距升级积分
- 行业实力榜（是否上榜 + 第几名）
- 资质（QS/CCC/ISO 等）

#### 商品池

- 在线商品总数 / SKU 列表
- 类目分布（每类比例）
- 价格区间 / 加权均价
- 销量分布（热销 / 长尾 / 僵尸）
- 生意通待加权 / 加权中 / 高级加权
- 严选 / 含选 / 旺旺定制商品数
- P4P 投放中 / 优质 / 机会商品

#### 流量数据（30 天 + 7 天双周期）

- 展现次数 / 访客数 / 浏览量
- 点击转化率 / 支付转化率
- 支付买家数 / 支付金额
- 30 天 GMV 排名（类目层级）

#### 询盘漏斗

- 总询盘量 / B 买询盘占比
- 优质询盘量 / 优质浓度
- 深度意向 / 拿样 / 下单（漏斗每步）
- 累计意向订单金额
- 客单价 / 复购率

#### 新灯塔分（4 维度 + 9 子项）

- 综合分 / 落后同行 %
- 商品体验 15%（品质退款率 / 问题率）
- 物流体验 35%（履约率 / 时效 / 退款）
- 售后体验 30%（处理时长 / 介入率）
- 咨询体验 20%（3 分钟响应率 / 满意度）

#### P4P 营销资产

- 营销分 / 投放中计划数 / 优质计划数
- 机会商品数 / 总消耗 / 单条询盘成本
- SKA 待解锁权益（30/35/40 万门槛）

#### 活动 / 违规

- 待处理违规 / 违规预警
- 履约预警 / 投诉处理
- 平台活动报名记录

#### 评价 / 服务承诺

- 评价基数 / 评价标签词频
- 印错包赔 / 延期必赔
- 48 小时发货 / 混批 / 现货
- 加工方式 / 起订量分级

### 1.2 同行三梯度对比（V2 核心修正）

#### ⛔ 红线

- 禁止拿其他客户店铺当本店参照
- 禁止跨客户对比（金驰 vs 艺漫坊不行）
- 每家店铺独立体检 · 对比组只选本店真实同类目同梯度同行

#### 梯度 A · 普通商家（3-5 家）

- 同等级 / 同类目 / 同钻级
- 来源
  - 1688 类目搜索
  - 平台推荐相似工厂
  - 流失竞店列表
  - 同款竞品 SKU 反查店铺

#### 梯度 B · 实力商家（2-3 家）

- 带"实力商家"标签
- 是本店"够得着的下一站"
- 重点抓
  - 实力商家专属玩法
  - VIP 体系 / 专属顾问运营
  - 流量加权红利使用

#### 梯度 C · 超级工厂 / 金牌制造（1-2 家）

- 行业天花板
- 重点抓
  - 钻级 / 实力榜 / 行业认证
  - 大客户案例

#### 三梯度对比的 4 维度（必抓）

- **优惠力度**：满减 / 折扣 / 优惠券 / 包邮门槛
- **营销手段**：活动报名 / 直播 / 引流款 / 会员体系
- **价格策略**：价格区间 / 阶梯价 / 起订量分级
- **服务承诺**：发货时效 / 包赔 / 退换货政策

### 1.3 行业趋势数据

- 同款竞品 TOP10 + 搜索增长率
- 类目热搜词月度榜
- 平台活动 / 节日节奏
- 流失竞店 TOP10（成熟店有 / 新店暂无）
- 浏览流失商品 TOP10

## 二、分析方向（Analyze what · 分析什么）

### 2.1 本店底盘扎实度

- 违规 / 履约 / 资质 / 钻级 全绿盘？
- 履约预警立即排查
- 极限词风险扫描

### 2.2 流量结构 vs 普通梯度同行

- 展现次数 vs 同行（流量给得对吗）
- 点击转化率 vs 同行（主图/标题/价格吸引人吗）
- 支付转化率 vs 同行（价格/起订量/承诺）
- 客单价 vs 同行（商业模型）

### 2.3 营销手段差距 vs 实力商家梯度（学什么）

- 实力商家用什么活动？本店有没有报？
- 实力商家的优惠力度？满 X 减 Y / X 折 / 包邮起订量
- 实力商家的会员体系？VIP / 老客券
- 实力商家的引流款定价？

### 2.4 服务承诺 / 价格 vs 三梯度（位置）

- 本店在三梯度里的相对位置（高/中/低）
- 价格带是否合理（与梯度匹配）
- 服务承诺缺口

### 2.5 BSR 新灯塔提升路径

- 4 维度哪个最差短板（物流 35% / 售后 30%）
- 9 子项中分值 ≤ 3.0 的有几个
- 提分公式：每提 1 子项的综合分增量
- 距金冠 4.5 还差多少

### 2.6 类目集中度 / 第二曲线机会

- 主类目占比 ≥ 90%（单品类风险）
- 上升风口 SKU 该不该上
- 降温赛道该不该砍

### 2.7 询盘漏斗断层（每一步流失率）

- 询盘 → 拿样转化率
- 拿样 → 下单转化率
- 哪一步流失率最高 = 命门

### 2.8 行业风口 vs 降温

- 同款竞品搜索 ≥ +5% 是风口
- 同款竞品搜索 ≤ -25% 要砍
- 季节性 / 节日 / 大事件

## 三、后续操作（Action directions · 怎么干）

### 3.1 立即修复（P0 命门）

- 漏斗断层修复（话术/报价/起订量）
- 违规清零 / 履约预警跟进
- 钻级 / 实力星级冲榜
- 全店包邮（+100% 转化加权）
- 极限词全量扫描

### 3.2 学习同行实力商家（P1 · V2 新增重点）

#### 优惠力度对标

- 满减规则：本店 vs 实力商家
- 折扣力度
- 优惠券模板配置
- 包邮起订量

#### 营销手段对标

- 活动报名通过率
- 引流款定价 + 数量
- VIP 会员体系
- 老客复购券
- 直播 / 短视频 / 内容营销

#### 价格策略对标

- 价格带分布
- 阶梯价配置
- 起订量分级
- 价格战 vs 错位竞争（owner 决策）

### 3.3 类目第二曲线（P1）

- 上升风口 SKU 立即上架
- 降温赛道砍投放
- 类目集中度 ≤ 80%

### 3.4 P4P 优化（P1）

- 优质计划立项
- 机会商品分批接入
- 单条询盘成本控制
- 砍无效关键词
- AI 推荐曝光优化

### 3.5 长期战略（P2）

- 钻级冲榜（一/二/三/金牌）
- 行业实力榜冲榜
- BSR 金冠（4.5 星）
- 实力星级升级（L4 → L5）
- 跨境专供 / 大促赛马 / 流量加权

### 3.6 月度复盘节奏

- 每月 26 号月度体检
- 周报：每周一
- 与上月数据 diff（异动 ±10% 必标记）
- 行动表完成率追踪

## 四、月度 SOP（How to execute · 怎么跑）

### Step 1 · 触发

- 用户召唤式（不自动）
- 触发词："跑 \<店铺\> 1688 月度体检"

### Step 2 · 上下文加载

- 读项目 CLAUDE.md
- 读上一份月度报告 PDF
- 读上月数据快照
- ⛔ 禁止读其他客户的项目数据当对比

### Step 3 · 资料查询（按"一"）

- 1.1 本店数据
- 1.2 三梯度同行（普通 3-5 / 实力 2-3 / 超级工厂 1-2）
- 1.3 行业趋势
- 落档 `02-数据快照/YYYY-MM-DD/` 7+ 份 MD

### Step 4 · 分析（按"二"）

- 8 个分析方向逐一过
- 与上月 diff
- 三梯度对比给结论

### Step 5 · 行动表生成（按"三"）

- P0 命门必做
- P1 高优做（含三梯度学习）
- P2 战略级
- 每条带：负责人 / 截止 / 对照对手

### Step 6 · PDF 渲染

- HTML → Chrome headless → PDF
- A4 / 中文字体 / 颜色编码

### Step 7 · 排版 OCR 自检

- pdftoppm 转 PNG
- OCR 自检关键页

### Step 8 · 归档

- PDF 存 `01-诊断报告/`
- PDF 存桌面（删旧版）
- git commit + push

## 五、复用到其他店铺（Day 0 SOP）

### Step A · 第 0 步必问

- 这个店铺以后可能商业化吗？
- 决定走完整 / 轻量 / 保守路径

### Step B · 建项目骨架

- `~/projects/<店铺英文名>-1688体检/`
- 9 个子目录 + CLAUDE.md
- 写死"三梯度对比"红线

### Step C · 套引擎模板

- 复制本思维导图（V2）
- 复制 V1 报告 HTML 模板（含三梯度章节）
- 复制 7+ 份数据快照 MD 模板

### Step D · 抓数据

- 按"一" 10+ 入口逐项抓
- 三梯度独立抓（不复用其他客户的同行数据）

### Step E · 生成报告

- 8 模块 × 四段式 + 4 附录
- 三梯度同行对比作为模块 6 主体
- HTML → PDF → 桌面 → push

### Step F · 月度复盘

- 每月 26 号触发
- 与上月 diff
- 版本号递增（V1 → V2 → V3）

## 六、V1 → V2 修正不再重提

### ❌ 禁止

- 拿金驰当艺漫坊参照
- 跨客户 SKU / 价格 / 营销手段对比
- "vs 金驰参照组" 出现在任何店铺报告里

### ✅ 必须

- 每家店铺独立体检
- 同行对比按"普通/实力/超级工厂"三梯度
- 对比维度：**优惠力度 / 营销手段 / 价格策略 / 服务承诺** 4 柱
- 同行抽样：3 家普通 + 2 家实力 + 1 家超级工厂

### 三梯度对比模板（写进每份 V_ 报告模块 6）

- 价格区间 · 起订量 · 满减规则 · 优惠券
- 包邮门槛 · 活动报名数 · VIP 体系 · 服务承诺
