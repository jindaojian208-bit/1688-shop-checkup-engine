# 1688 店铺月度体检方法论

## 一、数据采集层

### 1.1 红线规则（不可跨）

- **不自动过 1688 验证码**（撞码立即让用户手动）
- **不自动定时**（用户召唤式触发，禁 launchd / cron / schedule）
- 验证码识别 API 只调一次，失败立刻交还用户
- 自动化必须让位用户手动操作（不竞争同一 UI）
- **不替用户点"投放"按钮**（碰钱红线）

### 1.2 公开数据源（无需登录）

- 店铺首页 `https://[二级域名].1688.com/`
- 店铺商品列表 `/page/offerlist.htm`
- 工厂档案 tab（店铺前台）
- 加工专区 tab（店铺前台）
- 店铺动态 / 联系方式 tab

### 1.3 后台数据源（需登录）

#### 卖家工作台

- `work.1688.com` — 全店概览 + 待处理违规 + 金牌钻级 + 生意通加权
- 商品体检 `_path_=sellerPro/2017sellerbase_offer/checkCenter`
- 严选工作台 `_path_=sellerPro/changhuotong/yanxuanoffer`
- 行家选 `_path_=sellerPro/industry/hangjiaxuan`
- 分销严选 `_path_=sellerPro/2017sellerbase_fenxiao/pft-offer`
- 违规记录 `_path_=sellerPro/aliRule/ruleLllegal_new`

#### 生意参谋

- 首页 `sycm.1688.com/portal/home.htm` — 店铺诊断 + 同行对比
- 流量 `sycm.1688.com/ms/flow/overview`
- 商品 `sycm.1688.com/ms/item/overview`
- 询盘 `sycm.1688.com/ms/inquiry/overview`
- 客户 `sycm.1688.com/ms/customer/overview`

#### 竞争模块（最被低估的金矿）

- 竞店监控 `sycm.1688.com/ms/compete/shopMonitor`
- 竞店识别（流失竞店 TOP10）`sycm.1688.com/ms/compete/shopDiscern`
- 竞店分析 `sycm.1688.com/ms/compete/shopAnalyse`
- 竞品识别（同款竞品 TOP10）`sycm.1688.com/ms/compete/offerDiscern`
- 竞品监控 `sycm.1688.com/ms/compete/offerMonitor`

#### 新灯塔 5.0

- `work.1688.com/home/page/index.htm?_path_=sellerPro/lvyue/new-lighthouse-ai`
- 4 维度 + 9 子项 + 加分项

#### P4P 数字营销

- `p4p.1688.com/main.html` — 营销分 + 投放计划 + SKA 权益
- 智客通 / 推广 / 大客方案 / 报表 / 洞察

## 二、8 大模块体检

### 模块 ① 店铺基础健康

- **抓手**：店铺等级 / 资质合规 / 违规风控 / 基础配置 / 服务开通
- **数据来源**：工作台首页 + 体检中心 + 工厂档案
- **关键指标**
  - 服务分（前台 5 分制）
  - 回头率
  - 待处理违规数
  - 钻级（一钻/二钻/三钻）
  - 金牌制造钻级 6 项是否达成
  - 实力榜上榜情况
- **运费模板对照**（5 项核对）
  - 包装类重货首续重
  - 偏远地区差异化
  - 大件按体积重计算
  - 包邮起订量
  - 全店包邮（+100% 转化加权）

### 模块 ② 流量渠道

- **抓手**：搜索免费 / 场景推荐 / 付费 / 活动 / 流量问题
- **数据来源**：生意参谋首页 → 店铺诊断
- **核心 7 项指标**（本店 vs 同行）
  - 展现次数
  - 访客数
  - 浏览量
  - 点击转化率
  - 支付转化率
  - 支付买家数
  - 支付金额
- **双周期对比**
  - 近 30 天（行业基线）
  - 近 7 天（爆发验证）
- **判断模型**：高客单 vs 薄利多销 区分

### 模块 ③ 产品货品结构

- **抓手**：产品分层 / 商品优化 / 规格定价 / 动销管理 / 现货定制
- **数据来源**：生意参谋商品 + 商品体检 + P4P 商品榜
- **关键指标**
  - 在线商品总数
  - 有访问商品数
  - 动销商品数（动销率）
  - 高级加权商品数
  - 待加权 / 加权中数
  - 定制商品数（金牌钻级口径）
  - 主推"立即定制"按钮商品数
  - 未分类商品数
  - P4P 投放中 / 优质 / 机会商品
- **标签盘点**
  - 严选商品 / 含选商品
  - 小黄标 / 代工品牌 / 供货客户
  - 旺旺定制
- **僵尸爆品识别**：上榜但 0 销 SKU

### 模块 ④ 转化 & 询盘核心

- **抓手**：前端转化 / 询盘数据 / 成交转化 / 口碑体系 / 售后问题
- **数据来源**：生意参谋询盘 + 客户
- **关键指标**
  - 全店询盘量（年累计）
  - B 买询盘占比
  - 全店新访客数
  - 全店新买家数
  - 询盘 → 新客转化率
  - 客单价（30 天 / 7 天双口径）
  - 旺旺响应时长
  - 旺旺满意度
  - 复购率 / 大客户占比
- **客户分层**：ABC 三级 + TOP20 名单

### 模块 ⑤ BSR 新灯塔分（命门）

- **抓手**：4 大体验维度 + 9 个二级指标
- **数据来源**：work.1688.com 新灯塔
- **4 大维度（含权重）**
  - 商品体验 15%
    - 品质退款率
    - 品质问题率
  - 物流体验 35%
    - 履约率
    - 时效达成率
    - 发货物流退款率
  - 售后体验 30%
    - 退款处理时长
    - 平台介入率
  - 咨询体验 20%
    - 3 分钟响应率
    - 旺旺咨询满意度
- **加分项**：特色保障（最多 +0.2）
- **权益梯度**
  - ≥4 星：跨境专供 / 大促赛马 / 流量加权
  - ≥4.5 星：金冠商品积分 / 商品成长核心指标
- **提分公式**：3 项 3.0 子项各 +1 分 ≈ 综合 +0.37

### 模块 ⑥ 竞品 & 市场对标

- **抓手**：头部商家 / 竞品流量词 / 市场行情
- **数据来源**：生意参谋竞争模块
- **3 张数据表**
  - 流失竞店 TOP10（哪些店抢了你客户）
  - 同款竞品 TOP10（带搜索增长趋势）
  - 浏览流失商品 TOP10（被抢走的具体 SKU + 流失金额）
- **4 级对标体系**
  - 战略对手（流量+交易+流失三高）周度
  - BSR 高分对标（响应/回头率领先）周度
  - 流失承接 TOP3（外地高流失指数）月度
  - 本地次要 月度
- **每店扫描 8 维度**
  - 服务分
  - 回头率
  - 粉丝数
  - 入驻年限
  - 钻级
  - 主推 SKU 价格区间
  - 销量数据
  - 显式店铺促销活动

### 模块 ⑦ 运营 & 推广复盘

- **抓手**：日常运营 / 付费投放 / 活动 / 数据复盘
- **数据来源**：P4P + 工作台活动
- **P4P 关键指标**
  - 营销分
  - 投放中计划数
  - 优质计划数
  - 机会商品数（未推广）
  - 审核异常数
  - 昨日消耗
  - 年框累计消耗
  - 年框节奏偏差（月化 vs 计划）
- **SKA 权益（按预算解锁）**
  - 30 万：B 类买家专享
  - 35 万：同行竞对人群独享
  - 40 万：超级大买家独享
  - 昨日预算 < 550 元 → 权益收回
- **活动报名**
  - AI 活动营销（自动报名）
  - 平台活动 / 工业品闪购 / 行家选
  - 活动报名通过率
- **数据复盘节奏**
  - 周报（趋势）
  - 月报（深度 + 调整）
  - 季报（战略）

### 模块 ⑧ 定制类目专项（命门 / 壁垒）

- **抓手**：定制能力展示 / 咨询承接 / 包装材质说明
- **数据来源**：店铺前台加工专区 + 工厂档案 + 主推"立即定制"商品
- **三层落地**
  - 定制能力展示（前置说服）
    - 工艺能力矩阵图
    - 打样服务声明
    - 定制案例库 ≥ 12 个
  - 定制咨询承接（中段转化）
    - 30 分钟首响
    - 24 小时报价
    - 48 小时打样寄出
    - 报价模板 8 项必填
  - 包装 / 材质说明（后端兜底）
    - 材质参数表
    - 包装方案模板
    - 质检说明 + 换货政策
- **关键卖点候选**
  - 印错包赔 / 延期必赔
  - 实力榜 / 钻级 / 税务 A
  - VR 厂长带看 / SGS 认证
  - 起订量分级（单品 vs 套装）

## 三、4 个附录章节

### 附 A · 战略目标

- **3 个月战略目标**（带量化指标）
  - 新灯塔分提升目标
  - 行业排名提升目标
  - 询盘 / 新买家 / 复购率目标
  - 主品依赖度目标
  - SKA 年框节奏
  - 钻级冲榜目标
- **当月行动表**（P0/P1/P2 三级）
  - P0 命门必做
  - P1 高优做
  - P2 中优做
  - 每条带：负责人 / 截止日期 / 对照对手

### 附 B · 数据快照清单

- 项目目录：`02-数据快照/YYYY-MM-DD/`
- 文件命名规范：`类别_数据维度.md`
- 标准 6-7 份快照
  - 前台公开数据_店铺工厂档案
  - 新灯塔_BSR数据
  - P4P_数字营销数据
  - 活动报名+违规扣分
  - 30天+标签+本地对手补充
  - TOP3同行进店产品对比
  - 竞店实测_N家完整版
- **下次月度体检需补抓项**清单

### 附 C · TOP3 同行进店产品对比

- 行业排名 + 升降幅度
- 流失竞店 TOP10 完整列表
- TOP3 全国同行画像
- TOP3 本地同行画像
- 同款竞品 TOP10 + 搜索增长趋势
- 浏览流失商品 TOP10 + 流失金额
- 三大流失方向 + 当月行动
- 4 级对标体系

### 附 D · 竞店活动情报 + 营销策划

- **7 家竞店实测对比**（按流失指数）
  - 服务分 / 回头率 / 粉丝 / 钻级 / 价格 / 显式促销
- **1688 行业 6 大常见促销模板**
  - 满减 / 满件减
  - 限时折扣
  - 赠品 / 加购
  - 试用 / 打样优惠
  - 秒杀 / 特价款
  - 会员体系
- **三级营销策划**
  - P0 必做（服务分 + 标配承诺）
  - P1 选做（引流款 + 关键词截胡）
  - P2 战略级（钻级冲榜 + 体量追赶）
- **当月排期**（日级动作 + 对照对手）

## 四、输出格式

### 4.1 文件类型

- HTML 主稿（手写 + 内嵌 CSS）
- PDF 终交付（Chrome headless 渲染）
- Markdown 数据快照（中间产物）

### 4.2 页面规格

- A4 / `@page { size: A4 }`
- 页边距：上 16mm / 下 18mm / 左右 14mm
- 字体栈：`PingFang SC, Hiragino Sans GB, Microsoft YaHei`
- 主字号 10.5pt
- 行高 1.65

### 4.3 颜色编码

- 红色 `#c9482b`：警示 / 关键 / 命门
- 绿色 `#5a8d4e`：达标 / 亮点
- 黄色 `#d4a02a`：中性 / 待优化
- 浅红 `#fff3e6`：callout 背景
- 浅黄 `#fbf6ee`：表格斑马纹

### 4.4 章节结构

- 封面（badge + h1 + subtitle + "一页抓住核心" 表 + meta + footer）
- 前言（模型变更预警 / 报告范式说明）
- 8 模块 × 四段式
  - 原图抓手
  - 适配解读
  - 当前自查
  - 下一步动作
- 4 附录 A/B/C/D
- 结尾（一页带走）

### 4.5 排版红线

- **section 不要 page-break-inside: avoid**（否则长 section 整体推下页留空白）
- h2 / h3 / module-header 加 `page-break-after: avoid`
- kv-row 内 kv-box 保留 `break-inside: avoid`，**独立 kv-box 必须放开**
- callout 用 `orphans: 1; widows: 1`
- 单元素占整页 + 大空白 → **砍内容不要调 CSS**
- 表格行（tr）默认允许跨页

## 五、月度 SOP（用户召唤式）

### Step 1 · 触发

- 触发词："跑 1688 月度体检" / "做 X 店铺体检"
- 不配 launchd / 不配 cron / 不自动跑
- 用户确认开始才动

### Step 2 · 上下文加载

- 读项目 CLAUDE.md
- 读上一份月度报告 PDF
- 读上月数据快照 `02-数据快照/上月/`
- 拉通本月体检颗粒度（全量/单模块）

### Step 3 · 数据抓取

- 按"数据采集层"10+ 入口逐项抓
- 撞验证码 → 立即停下让用户手动 → 用户过完通知后继续
- 落档到 `02-数据快照/YYYY-MM-DD/` 7 份 MD
- 每份 MD 都要带数据来源 URL + 抓取时间

### Step 4 · 数据填充

- 套用 8 模块四段式骨架
- 与上月数据 diff（异动 ±10% 必标记）
- 4 附录章节按模板填充
- "下次需补抓"项目化记录

### Step 5 · 报告生成

- HTML → Chrome headless → PDF
  - `chrome --headless --disable-gpu --no-pdf-header-footer --print-to-pdf=...`
- 自检：文件大小 / 页数 / 元数据
- `mdimport` 后 `mdls -name kMDItemNumberOfPages`

### Step 6 · 排版 OCR 自检

- PDF → PNG：`pdftoppm -f N -l M -r 100 input.pdf output -png`
- OCR 自检关键页：封面 / 前言 / 命门模块 / 各附录开头
- 撞空白页 / 重叠 → 砍冗余内容（不绕弯调 CSS）
- 单元素孤页 → 删 / 合并到附录 P0 行动表

### Step 7 · 归档 + 推送

- PDF 存 `01-诊断报告/`
- PDF 存 `~/Desktop/`
- **删旧版**桌面 PDF（同一用途只留最新）
- HTML / PDF / 数据快照 `git add + commit + push origin main`

### Step 8 · SKA 对接

- 命门级行动同步给 SKA PM
- 约月度运营主管会
- 收集主管反馈 → 下一轮迭代输入

## 六、复用到其他店铺的 6 步流程

### Step A · 第 0 步必问

- 这个店铺以后可能商业化吗？
  - 会 → 完整路径（四件套 + 引擎解耦）
  - 纯自用 → 轻量路径
  - 不知道 → 保守路径

### Step B · 建项目骨架

- `~/projects/<英文连字符店铺名>/`
- `01-诊断报告/`
- `02-数据快照/YYYY-MM-DD/`
- `03-执行 SOP/`
- `04-周度复盘/`
- `05-对接记录/`
- `CLAUDE.md`（店铺基本信息 + 触发词 + 红线）

### Step C · 套方法论模板

- 复制本思维导图作为 SOP 蓝图
- 用本骨架的 HTML 模板（沿用 V14 颜色 + 排版规则）
- 修改店铺主体名称 / 类目 / 主营结构

### Step D · 抓数据

- 按"数据采集层" 10+ 入口逐项抓
- 撞验证码立即让用户手动
- 7 份数据快照落档

### Step E · 生成报告

- 8 模块 × 四段式 + 4 附录
- HTML → PDF → 桌面归档 → push

### Step F · 月度复盘

- 每月 1 号触发
- 与上月 diff
- 报告版本号每月递增（V1 → V2 → V3）
