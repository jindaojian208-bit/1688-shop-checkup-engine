# 1688 店铺月度体检方法论 V3（engine-v3.0）

## 🚨 红线索引（任何动作前必扫）

### 红线全部物理解耦到 `红线准则/` 目录

- 总索引：`红线准则/00_红线总表.md`（14 条 R-001 ~ R-014）
- 方法论：`红线准则/03_对比方法红线.md`（R-001 ~ R-004）
- 平台合规：`红线准则/02_平台合规红线.md`（R-005 ~ R-008）
- 工程：`红线准则/01_工程红线.md`（R-009 ~ R-014）

### 进入任何店铺月度体检任务前

- Step 0 · 读 `红线准则/00_红线总表.md`（一页扫完）
- Step 1 · 再进入下面的 4 章生成逻辑

## 一、资料查询（What to scrape · 抓什么）

### 1.1 本店数据（自家 · 10 个入口）

#### 店铺基础（含 V3 增补）

- 店铺主体名 / 二级域名 / memberId
- 入驻年限 / 成立时间
- 地址 / 工厂面积 / 员工数
- 经营大类 / 主营类目（按比例）
- 钻级 / 实力星级（L1-L5）
- 资质（QS/CCC/ISO 等）
- **【V3 增补】产品总数量**（在线 SKU 数）

#### 商品池

- 在线商品总数 / SKU 列表
- 类目分布（每类比例）
- 价格区间 / 加权均价
- 销量分布（热销 / 长尾 / 僵尸）
- 生意通待加权 / 加权中 / 高级加权
- 严选 / 含选 / 旺旺定制商品数
- P4P 投放中 / 优质 / 机会商品

#### 流量数据（30 天 + 7 天双周期）

- 展现次数 / 访客数 / 浏览量
- 点击转化率 / 支付转化率
- 支付买家数 / 支付金额

#### 询盘漏斗（含 V3 增补）

- 总询盘量 / B 买询盘占比
- 优质询盘量 / 优质浓度
- 拿样 / 下单（漏斗每步）
- **【V3 增补】询盘总转化率**（询盘→下单整体口径，作为命门指标）

#### 入店关键词（V3 关键入口）

- 客户搜什么词来（生意参谋·流量·入店关键词）
- 每个关键词的访客 / 引导下单 / 转化率
- 用作 Step 3 同行抓取的种子关键词

#### 新灯塔分（4 维度 + 9 子项）

- 综合分 / 落后同行 %
- 商品体验 15%（品质退款率 / 问题率）
- 物流体验 35%（履约率 / 时效 / 退款）
- 售后体验 30%（处理时长 / 介入率）
- 咨询体验 20%（3 分钟响应率 / 满意度）

#### P4P 营销资产（含 V3 增补）

- 营销分 / 投放中计划数 / 优质计划数
- 机会商品数 / 总消耗 / 单条询盘成本
- SKA 待解锁权益（30/35/40 万门槛）
- **【V3 增补】同行优质计划占比**（同行优质 / 投放总数 vs 本店）

#### 活动 / 违规

- 待处理违规 / 违规预警
- 履约预警 / 投诉处理
- 平台活动报名记录

### 1.2 同行对比（V3 · 自然首页 3-5 个）

#### V2 → V3 演进

- V2：三梯度（普通 3-5 / 实力 2-3 / 超工 1-2 · 共 6-10 家）
- ⛔ V3 · 三梯度概念删除（实力商家/超工对普通商家无可比性）
- ✅ V3 · 自然首页 3-5 个（撤广告还能起来的真本事）

#### Step A · 取本店 TOP 入店关键词

- 来源：生意参谋·流量·入店关键词
- 取转化最高的 2-3 个关键词

#### Step B · 用关键词去主站首页搜索

- `https://www.1688.com/zw/page.html?keywords=...`
- 只抓【首页第 1 页】（第 2-3 页参考价值低）

#### Step C · 排除付费坑位

- ❌ 广告位（花钱买的曝光）
- ❌ 实力商家坑位（平台付费扶持）
- ❌ 超级工厂坑位（头部专属）

#### Step D · 取自然 3-5 个优秀产品

- 销量较高
- 转化也高
- 有营销活动（满减 / 优惠券 / 赠品）
- 标题 / 主图 / 详情页能抓住眼球

#### 4 维度对比（必抓）

- **优惠力度**：满减 / 折扣 / 优惠券 / 包邮门槛
- **营销手段**：活动报名 / 直播 / 引流款 / 会员体系
- **价格策略**：价格区间 / 阶梯价 / 起订量分级
- **服务承诺**：发货时效 / 包赔 / 退换货政策

#### 【V3 新增】营销策略手段对比

- 满减 / 优惠券 / 赠品 / 运费险 / 包邮 / 直播 / 会员 / 引流款
- 本店 vs 自然首页同行 矩阵

#### 【V3 新增】同款 SKU 差异化点

- 标题 / 主图 / 价格 / 销量 / 服务承诺
- 本店 vs 同行 逐项

### 1.3 行业趋势（V3 精简版）

- 同款竞品搜索增长率（生意参谋·竞争·竞品识别）
- ❌ 砍：类目热搜词月度榜（颗粒度过散）
- ❌ 砍：流失竞店 TOP10（已在本店数据里）
- ❌ 砍：浏览流失商品 TOP10（已在 1.2 同行对比）

### 1.4 节日倒推日历（引擎写死）

#### 大节日（>2 个月）

- 中秋节（5-15 起铺 · 提前 4 个月）
- 双 11（9-20 起铺 · 提前 2 个月）
- 双 12（10-20 起铺 · 提前 2 个月）
- 年货节（11-15 起铺 · 提前 2 个月）
- 春节（12-1 起铺 · 提前 2 个月）

#### 小节日（1.5 个月）

- 母亲节（4-1 起铺）
- 父亲节（5-1 起铺）
- 教师节（8-1 起铺）
- 国庆节（8-20 起铺）

#### 季节性

- 毕业季（5-15 起铺 · 提前 1 个月）

## 二、分析方向（Analyze what · 8 方向 V3 话术）

### 2.1 本店底盘扎实度（不变）

- 违规 / 履约 / 资质 / 钻级 全绿盘？
- 履约预警立即排查
- 极限词风险扫描

### 2.2 流量结构 vs 自然首页同行（V3 改）

- 展现次数 vs 同行（流量给得对吗）
- 点击转化率 vs 同行
- 支付转化率 vs 同行
- 客单价 vs 同行

### 2.3 营销手段 vs 自然首页同行（V3 改）

- 同行的优惠力度（满减/优惠券/包邮）
- 同行的营销手段（活动/直播/引流款/会员）
- 同行的【营销策略手段】（V3 新增维度）
- 本店缺什么 → 立即补

### 2.4 服务承诺 / 价格 vs 自然首页 3-5 个（V3 改）

- 本店服务承诺标配齐不齐
- 价格带是否与自然首页同行匹配
- 起订量是否合理

### 2.5 BSR 新灯塔提升路径（不变）

- 4 维度哪个最差短板（物流 35% / 售后 30%）
- 9 子项中分值 ≤ 3.0 的有几个
- 提分公式：每提 1 子项的综合分增量

### 2.6 类目集中度 / 第二曲线（不变）

- 主类目占比 ≥ 90%（单品类风险）
- 上升风口 SKU 该不该上
- 降温赛道该不该砍

### 2.7 询盘漏斗断层（V3 增补）

- 询盘 → 拿样转化率
- 拿样 → 下单转化率
- 【V3 增补】询盘总转化率（命门指标）
- 哪一步流失率最高 = 命门

### 2.8 行业风口 vs 降温（V3 精简）

- 同款竞品搜索 ≥ +5% 是风口
- 同款竞品搜索 ≤ -25% 要砍
- 节日倒推日历自动提示（距 XX 节 Y 天 → 提前铺 N 个 SKU）

## 三、后续操作（Action · P0/P1/P2 语义驱动 · V3 改）

### 3.1 P0 · 心门（不修就崩盘）

- 数量 ≤ 3 项（避免注意力稀释）
- 触发：违规扣分 / 询盘漏斗断层 / 加权未激活 / BSR 子项 ≤ 3.0 / 服务承诺缺标配
- 文案：写"立即"，不写"建议"

### 3.2 P1 · 高优（与同行差距是起作用的缺口）

- 触发：同行有满减/优惠券我们没有 / 引流款价位空缺 / 主图标题没抓住眼球 / 营销手段标签缺失
- 文案：写"优先补齐"
- 数量不限

### 3.3 P2 · 战略（3-6 个月长期发展）

- 触发：冲钻 / 冲榜（实力商家/超工标） / 第二曲线 / 类目集中度调整 / 资质认证
- 文案：写"半年内"
- 数量不限

### 3.4 关键词战略（合规口径 · R-005 已写死）

- ❌ 不上 IP 词（鬼灭/TNT/时光代理人/谷子二次元 等任何 IP）
- ✅ 合规通用风口词
  - 节日（中秋/春节/母亲节/毕业季）
  - 校园（校徽/班服/社团）
  - 婚庆（伴手礼/喜糖/婚礼布置）
  - 企业定制（logo/公司礼品/年会）
  - 通用风格（Q 版/卡通/二次元周边/流沙/UV）
  - 玩法品类（盲盒/立牌/钥匙扣/冰箱贴）

## 四、月度 SOP（How to execute · 怎么跑）

### Step 0 · 读红线（必做）

- `cat 红线准则/00_红线总表.md`

### Step 1 · 触发

- 用户召唤式（不自动 · 红线 R-010）
- 触发词："跑 \<店铺\> 1688 月度体检"

### Step 2 · 上下文加载

- 读项目 CLAUDE.md
- 读上一份月度报告 PDF
- 读上月数据快照
- 红线 R-001 · 禁止读其他客户的项目数据当对比

### Step 3 · 资料查询（按"一"）

- 1.1 本店数据 10 个入口（含 V3 增补 5 项字段）
- 1.2 自然首页 3-5 个同行（V3 替代三梯度）
- 1.3 行业趋势（精简版只剩同款搜索增长率）
- 1.4 节日倒推日历自动提示
- 落档 `02-数据快照/YYYY-MM-DD/` 7+ 份 MD

### Step 4 · 分析（按"二"）

- 8 个分析方向逐一过（V3 话术调整）
- 与上月 diff
- 4 维度 + 营销策略手段对比给结论

### Step 5 · 行动表生成（按"三"）

- P0 心门（≤ 3 项 · "立即"）
- P1 高优（无限 · "优先"）
- P2 战略（无限 · "半年内"）
- 每条带：负责人 / 截止 / 对照对手

### Step 6 · PDF 渲染

- HTML → Chrome headless → PDF
- A4 / 中文字体 / 颜色编码
- 8 模块 + 3 附录（V3 · A 行动表 / B 数据快照清单 / C 自然首页同行+行业趋势合并）

### Step 7 · 排版 OCR 自检

- pdftoppm 转 PNG
- OCR 自检关键页

### Step 8 · 归档（B-7 拍板）

- 渲染 PDF 到 `01-诊断报告/`
- 把桌面旧版（同店铺）`mv` 到 `01-诊断报告/`
- 把新版 `cp` 到桌面（删旧留新）
- 桌面命名：`<店铺>1688月度体检报告_<月份>_V<主.次>.pdf`
- 主号发版打 git tag

## 五、复用到其他店铺（Day 0 SOP）

### Step A · 第 0 步必问

- 这个店铺以后可能商业化吗？
- 决定走完整 / 轻量 / 保守路径

### Step B · 建项目骨架

- `~/projects/<店铺英文名>-1688体检/`
- 9 个子目录 + CLAUDE.md
- 单店 CLAUDE.md 头部 1 行引用红线总表

### Step C · 套引擎模板

- 复制本思维导图（V3）
- 复制 V3 报告 HTML 模板（含自然首页同行章节）
- 复制 7+ 份数据快照 MD 模板（含 V3 增补 5 字段）

### Step D · 抓数据

- 按"一" 10+ 入口逐项抓
- 自然首页 3-5 个独立抓（V3 · 不复用其他客户的同行数据）

### Step E · 生成报告

- 8 模块 + 3 附录（V3 · 附录 4 合并为 3）
- 模块 6：自然首页同行 4 维度对比矩阵
- HTML → PDF → 桌面（删旧留新）→ push

### Step F · 月度复盘

- 按需触发（B-7 · 不绑日期）
- 与上月 diff
- 版本号 V 主.次双号递增
